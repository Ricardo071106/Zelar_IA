services:
  - type: web
    name: zelar-ia
    env: docker
    plan: free
    branch: main
    disk:
      name: whatsapp-auth
      mountPath: /opt/render/project/src/.whatsapp-auth
      sizeGB: 1
    envVars:
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
      - key: NODE_ENV
        value: production
      - key: WHATSAPP_AUTH_DIR
        value: /opt/render/project/src/.whatsapp-auth