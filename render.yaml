services:
  - type: web
    name: telegram-scheduler-bot
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/simple-server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    autoDeploy: true 